---
layout: default
---
<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-list-item{% if forloop.last %} last{% endif %}">
    <a class="post-title" href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span class="post-date">{{ post.date | date: "%B %-d, %Y" }}</span>
  </li>
  {% endfor %}
</ul>
