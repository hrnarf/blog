---
layout: default
---
<article class="post">
  <h1 class="post-title-full">{{ page.title }}</h1>
  <p class="post-meta">Published on {{ page.date | date: "%B %-d, %Y" }}</p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
<p class="back-link"><a href="{{ '/' | relative_url }}">&larr; Back to all posts</a></p>
