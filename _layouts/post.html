---
layout: default
---
<article class="post">
  <p class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</p>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-content">
    {{ content }}
  </div>
</article>
<p class="back-link"><a href="{{ '/' | relative_url }}">&larr; Back to all posts</a></p>
